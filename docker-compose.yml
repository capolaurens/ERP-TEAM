# Base de datos PostgreSQL para desarrollo local.
# Uso:  docker compose up -d   (arrancar)   |   docker compose down   (parar)
# La URL de conexión ya está en .env -> DATABASE_URL
services:
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp
    ports:
      - "5432:5432"
    volumes:
      - erp_pgdata:/var/lib/postgresql/data

volumes:
  erp_pgdata:
